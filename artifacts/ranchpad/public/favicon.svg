<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Green rounded square background -->
  <rect width="32" height="32" rx="7" fill="#2d5a3d"/>

  <!-- Cupola -->
  <rect x="13" y="2" width="6" height="3.5" rx="1" fill="white"/>

  <!-- Gable roof (filled white triangle) -->
  <polygon points="1,15 16,4 31,15" fill="white"/>

  <!-- Barn body (filled white rectangle) -->
  <rect x="3" y="15" width="26" height="14" rx="0.5" fill="white"/>

  <!-- Eave line -->
  <line x1="3" y1="15" x2="29" y2="15" stroke="#2d5a3d" stroke-width="1.5"/>

  <!-- X brace (green lines over white body) -->
  <line x1="3" y1="15" x2="29" y2="29" stroke="#2d5a3d" stroke-width="2" stroke-linecap="round"/>
  <line x1="29" y1="15" x2="3" y2="29" stroke="#2d5a3d" stroke-width="2" stroke-linecap="round"/>
</svg>
