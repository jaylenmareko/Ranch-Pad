name: Daily Agent

on:
  schedule:
    - cron: "0 13 * * *"   # 08:00 CT (UTC-5) — runs daily
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  run-agents:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to commit session logs back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install anthropic requests
          npm install -g pnpm

      - name: Run agent — Ranch-Pad
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONIOENCODING: utf-8
        run: |
          cd ".claude/agents"
          python agent.py --project Ranch-Pad
        continue-on-error: true

      - name: Wait for rate limit window to reset
        run: sleep 90

      - name: Run agent — pjroutes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PYTHONIOENCODING: utf-8
        run: |
          cd ".claude/agents"
          python agent.py --project pjroutes
        continue-on-error: true

      - name: Commit session logs
        run: |
          git config user.name "claude-agent"
          git config user.email "agent@noreply.github.com"
          git add sessions/
          git diff --cached --quiet || git commit -m "chore: agent session log $(date -u +%Y-%m-%d)"
          git push
